<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <style>

        body{
            font-family:Arial;
            background:#FFF5F7;
            padding:40px;
        }

        form{
            background:white;
            max-width:500px;
            margin:auto;
            padding:30px;
            border-radius:15px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
        }

        button{
            background:#ff5c9d;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<form method="POST" enctype="multipart/form-data">

    <h2>Add New Product</h2>

    <input type="text" name="title" placeholder="Product Title" required>

    <input type="text" name="price" placeholder="Price" required>

    <input type="text" name="affiliate_link" placeholder="Affiliate Link" required>

    <input type="file" name="image" required>

    <button type="submit">
        Save Product
    </button>

</form>

</body>
</html>
