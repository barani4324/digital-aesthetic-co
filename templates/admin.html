<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#FFF5F7;
            padding:30px;
        }

        h1{
            color:#ff5c9d;
        }

        .btn{
            background:#ff5c9d;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:8px;
            text-decoration:none;
        }

        table{
            width:100%;
            background:white;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            padding:15px;
            border:1px solid #eee;
            text-align:center;
        }

        img{
            width:80px;
            border-radius:10px;
        }

        .delete{
            background:red;
            color:white;
            padding:8px 12px;
            border-radius:5px;
            text-decoration:none;
        }

    </style>

</head>
<body>

<h1>Admin Dashboard</h1>
<a href="/logout">
    <button style="
        background:red;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:8px;
        cursor:pointer;">
        Logout
    </button>
</a>

<a href="/add-product" class="btn">
+ Add Product
</a>

<table>

<tr>
    <th>Image</th>
    <th>Title</th>
    <th>Price</th>
    <th>Action</th>
</tr>

{% for product in products %}

<tr>

    <td>
        <img src="{{ url_for('static', filename='uploads/' + product.image) }}">
    </td>

    <td>{{ product.title }}</td>

    <td>{{ product.price }}</td>

    <td>
        <a href="/delete/{{ product.id }}" class="delete">
            Delete
        </a>
    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
